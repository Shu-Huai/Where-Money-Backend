# MySQL驱动类名
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Hikari连接池最大生命周期（毫秒）
spring.datasource.hikari.max-lifetime=500000

# Jackson配置
# 日期格式
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
# 时区设置
spring.jackson.time-zone=GMT+8

# 文件上传配置
# 最大文件大小
spring.servlet.multipart.max-file-size=100MB
# 最大请求大小
spring.servlet.multipart.max-request-size=200MB

# Redis配置
# Redis主机地址
spring.data.redis.host=redis.lvshuhuai.cn
# Redis端口
spring.data.redis.port=6379
# Jedis连接池最大等待时间（毫秒）
spring.data.redis.jedis.pool.max-wait=30000
# Jedis连接池最大活跃连接数
spring.data.redis.jedis.pool.max-active=100
# Jedis连接池最大空闲连接数
spring.data.redis.jedis.pool.max-idle=20
# Jedis连接池最小空闲连接数
spring.data.redis.jedis.pool.min-idle=0
# Redis连接超时时间（毫秒）
spring.data.redis.timeout=3000

# MyBatis配置
# 下划线转驼峰命名映射
mybatis.configuration.map-underscore-to-camel-case=true
# Mapper文件位置
mybatis.mapper-locations=classpath:mapper/*.xml

# SQL初始化配置
# 初始化模式（always：总是初始化）
spring.sql.init.mode=always
# Schema文件位置
spring.sql.init.schema-locations=classpath:schema.sql

# 服务器配置
# 服务器端口
server.port=5050
# MVC路径匹配策略
spring.mvc.pathmatch.matching-strategy=ant-path-matcher

# Token配置
# Token私钥
token.privateKey=1234567890
# 年轻Token过期时间（毫秒）
token.youngToken=1000000
# 老Token过期时间（毫秒）
token.oldToken=3000000000

# Redis缓存过期时间配置（天）
# 账单分类缓存过期时间
redis.billCategory.expire=7
# 资产缓存过期时间
redis.asset.expire=7
# 账单缓存过期时间
redis.bill.expire=7

